# Deep-Learning Skill 默认配置

# === 产物生成设置 ===
# 默认生成的产物类型（用空格分隔）
# 可选: report audio slides mindmap quiz video infographic flashcards
DEFAULT_ARTIFACTS="report audio slides mindmap quiz"

# 是否生成所有可用产物类型
GENERATE_ALL=false

# === Research 模式 ===
# 默认研究模式: fast (10-20秒) | deep (深度调研)
DEFAULT_RESEARCH_MODE="deep"

# === Obsidian 集成 ===
# Obsidian Vault 路径（留空则禁用）
OBSIDIAN_VAULT_PATH="$HOME/Library/CloudStorage/OneDrive-个人/obsidian-vault"
OBSIDIAN_INBOX_FOLDER="Inbox"

# 是否在 Obsidian 中创建学习笔记
ENABLE_OBSIDIAN_INTEGRATION=true

# === 输出设置 ===
# 产物下载目录
OUTPUT_BASE_DIR="$HOME/.openclaw/workspace/deep-learning-output"

# 是否保留中间文件
KEEP_TEMP_FILES=false

# === 超时设置（秒）===
SOURCE_PROCESSING_TIMEOUT=600
RESEARCH_TIMEOUT_FAST=60
RESEARCH_TIMEOUT_DEEP=1800
ARTIFACT_TIMEOUT_REPORT=900
ARTIFACT_TIMEOUT_AUDIO=1800
ARTIFACT_TIMEOUT_SLIDES=2700
ARTIFACT_TIMEOUT_VIDEO=3600
ARTIFACT_TIMEOUT_QUIZ=900

# === 重试设置 ===
MAX_RETRY_ATTEMPTS=2
RETRY_DELAY_SECONDS=300

# === Feishu 消息设置 ===
# 发送完整报告还是仅摘要
FEISHU_SEND_FULL_REPORT=false
FEISHU_SEND_SUMMARY=true

# 是否以卡片形式发送测试题
FEISHU_INTERACTIVE_QUIZ=true

# === 日志设置 ===
LOG_LEVEL="INFO"  # DEBUG | INFO | WARN | ERROR
LOG_TO_FILE=true
